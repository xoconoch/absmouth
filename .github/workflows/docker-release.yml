name: Build and Push Docker Images

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image Identifier
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[A-Z]' '[a-z]')
          echo "IMAGE_BASE=ghcr.io/${OWNER}/absmouth" >> $GITHUB_ENV
          echo "VERSION=${{ github.event.release.tag_name }}" >> $GITHUB_ENV

      - name: Build and push CPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:latest
            ${{ env.IMAGE_BASE }}:${{ env.VERSION }}
            ${{ env.IMAGE_BASE }}:cpu
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push OpenVINO image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.openvino
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:openvino
            ${{ env.IMAGE_BASE }}:openvino-${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push RKNPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.rknpu
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}:rknpu
            ${{ env.IMAGE_BASE }}:rknpu-${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
