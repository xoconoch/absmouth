name: Build and Push Docker Images

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        device: [cpu, cuda, openvino]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image Metadata
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[A-Z]' '[a-z]')
          IMAGE_BASE="ghcr.io/${OWNER}/absmouth"
          RAW_TAG="${{ github.event.release.tag_name }}"
          
          if [[ "$RAW_TAG" =~ ^v ]]; then
            V_VERSION="$RAW_TAG"
          else
            V_VERSION="v$RAW_TAG"
          fi
          
          DEVICE="${{ matrix.device }}"
          TAGS="${IMAGE_BASE}:${V_VERSION}-${DEVICE},${IMAGE_BASE}:${DEVICE},${IMAGE_BASE}:latest-${DEVICE}"
          
          if [ "$DEVICE" = "cpu" ]; then
            TAGS="${TAGS},${IMAGE_BASE}:${V_VERSION},${IMAGE_BASE}:latest"
          fi
          
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          build-args: |
            DEVICE=${{ matrix.device }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
